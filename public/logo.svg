<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" fill="none">
  <defs>
    <!-- Main silver gradient for left face of A -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d0d0"/>
      <stop offset="40%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#909090"/>
    </linearGradient>
    <!-- Right face darker -->
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b0b0b0"/>
      <stop offset="50%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#707070"/>
    </linearGradient>
    <!-- Crossbar gradient -->
    <linearGradient id="crossbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8c8c8"/>
      <stop offset="50%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <!-- Inner shadow gradient -->
    <linearGradient id="innerLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#888888"/>
      <stop offset="100%" style="stop-color:#555555"/>
    </linearGradient>
    <linearGradient id="innerRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#aaaaaa"/>
      <stop offset="100%" style="stop-color:#666666"/>
    </linearGradient>
  </defs>

  <!-- Left outer leg of A -->
  <polygon points="90,230 155,30 185,30 125,230" fill="url(#leftFace)"/>
  <!-- Left inner edge (3D effect) -->
  <polygon points="100,230 160,30 175,30 118,230" fill="url(#innerLeft)" opacity="0.4"/>

  <!-- Right outer leg of A -->
  <polygon points="410,230 345,30 315,30 375,230" fill="url(#rightFace)"/>
  <!-- Right inner edge (3D effect) -->
  <polygon points="400,230 340,30 325,30 362,230" fill="url(#innerRight)" opacity="0.4"/>

  <!-- Crossbar outer shape -->
  <polygon points="148,165 352,165 340,195 160,195" fill="url(#crossbar)"/>
  <!-- Crossbar inner cutout (the gap) -->
  <polygon points="168,165 332,165 318,195 182,195" fill="white"/>

  <!-- Bottom border lines for 3D depth -->
  <line x1="90" y1="230" x2="125" y2="230" stroke="#888" stroke-width="1.5"/>
  <line x1="375" y1="230" x2="410" y2="230" stroke="#888" stroke-width="1.5"/>

  <!-- AUFERMA 2.0 text -->
  <text x="250" y="272"
    font-family="'Arial', sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="12"
    text-anchor="middle"
    fill="#2d3748">AUFERMA 2.0</text>

  <!-- Tagline -->
  <text x="250" y="298"
    font-family="'Arial', sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#94a3b8">REPRESENTAMOS SOLUÇÕES. | CONECTAMOS NEGÓCIOS.</text>
</svg>
